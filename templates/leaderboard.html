<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pistetaulukko - Kristoffer Kolumbuksen jäljillä – maanarvauspeli</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/antique-theme.css') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #3b2a16;
        }

        table {
            width: 80%;
            max-width: 800px;
            padding: 20px;
            margin-top: 20px;
            border-collapse: collapse;
            text-align: center;
            background-color: rgba(247, 236, 214, 0.88);
            border-radius: 10px;
            border: 1px solid rgba(113, 81, 45, 0.36);
            box-shadow: 0 16px 28px rgba(73, 48, 24, 0.16);
        }

        th, td {
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        th {
            background-color: #5a3f22;
            color: #fff;
        }

        tr:nth-child(even) {
            background-color: rgba(231, 208, 172, 0.34);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #5a3f22;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #74542f;
        }
    </style>
</head>
<body>
    <h1>Pistetaulukko</h1>

    <table align="center">
        <tr>
            <th>Sijoitus</th>
            <th>Käyttäjänimi</th>
            <th>Pisteet</th>
        </tr>
        {% for user in top_10_scores %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/game">Takaisin peliin</a>
    <a href="/logout">Lopeta peli</a>
</body>
</html>
