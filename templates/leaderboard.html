<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pistetaulukko - Kristoffer Kolumbuksen jäljillä – maanarvauspeli</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/antique-theme.css') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 8px 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100svh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            text-align: center;
            color: #3b2a16;
            margin: 8px 0 6px;
        }

        table {
            width: min(96vw, 820px);
            max-width: 820px;
            margin-top: 8px;
            border-collapse: collapse;
            text-align: center;
            background-color: rgba(247, 236, 214, 0.88);
            border-radius: 10px;
            border: 1px solid rgba(113, 81, 45, 0.36);
            box-shadow: 0 16px 28px rgba(73, 48, 24, 0.16);
            overflow: hidden;
        }

        th, td {
            padding: 11px 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            white-space: normal;
            word-break: break-word;
        }

        th {
            background-color: #5a3f22;
            color: #fff;
        }

        tr:nth-child(even) {
            background-color: rgba(231, 208, 172, 0.34);
        }

        a {
            display: inline-block;
            margin-top: 0;
            padding: 15px 30px;
            background-color: #5a3f22;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #74542f;
        }

        .nappi-rivi {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
            width: min(96vw, 820px);
            padding-bottom: 2px;
            box-sizing: border-box;
        }

        .nappi-rivi a {
            min-width: 170px;
            text-align: center;
            padding: 12px 20px;
        }

        @media (max-width: 640px) {
            body {
                padding: 8px 0;
            }

            h1 {
                font-size: clamp(1.6rem, 7.9vw, 2rem);
                margin: 6px 0 4px;
            }

            table {
                margin-top: 6px;
                font-size: 0.93rem;
            }

            th, td {
                padding: 8px 6px;
            }

            .nappi-rivi {
                gap: 8px;
            }

            .nappi-rivi a {
                min-width: 0;
                width: calc(50% - 4px);
                max-width: 210px;
                padding: 10px 8px;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 420px) {
            table {
                font-size: 0.86rem;
            }

            th, td {
                padding: 6px 4px;
            }

            .nappi-rivi a {
                font-size: 0.9rem;
                padding: 9px 6px;
            }
        }
    </style>
</head>
<body>
    <h1>Pistetaulukko</h1>

    <table align="center">
        <tr>
            <th>Sijoitus</th>
            <th>Käyttäjänimi</th>
            <th>Pisteet</th>
        </tr>
        {% for user in top_10_scores %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
        </tr>
        {% endfor %}
    </table>

    <div class="nappi-rivi">
        <a href="/game">Takaisin peliin</a>
        <a href="/logout">Lopeta peli</a>
    </div>
</body>
</html>
