<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lentokenttäarvausmestari - Pelaa</title>
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to top, floralwhite, lightsteelblue) ;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            color: #333;
            margin: 0;
            letter-spacing: 0.8px;
        }

        .otsikko-rivi {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin: 10px 0 4px;
        }

        .kompassi-kortti {
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(0, 0, 0, 0.22);
            border-radius: 14px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .kompassi-svg {
            width: 260px;
            max-width: 70vw;
            height: auto;
            display: block;
        }

        .kompassi-dot-ring {
            fill: none;
            stroke: #12141b;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 0.2 14.5;
        }

        .kompassi-outer-ring {
            fill: #ffffff;
            stroke: #11131a;
            stroke-width: 4;
        }

        .kompassi-middle-ring {
            fill: none;
            stroke: #1a1d26;
            stroke-width: 3;
        }

        .kompassi-tick-ring {
            fill: none;
            stroke: #2b2f3b;
            stroke-width: 8;
            stroke-dasharray: 1 7;
        }

        .kompassi-inner-ring {
            fill: #f4f5f8;
            stroke: #131722;
            stroke-width: 3;
        }

        .kompassi-axis {
            stroke: #1d2230;
            stroke-width: 2;
            opacity: 0.75;
        }

        .kompassi-ruusu-cardinal {
            fill: #1d2230;
        }

        .kompassi-ruusu-vali {
            fill: #3a4050;
        }

        .kompassi-keskusta {
            fill: #11131a;
            stroke: #11131a;
            stroke-width: 1;
        }

        .kompassi-joen-uoma {
            fill: #ffffff;
        }

        .kompassi-teksti-paa {
            fill: #11131a;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.2px;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .kompassi-teksti-vali {
            fill: #11131a;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1px;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .kompassi-selite {
            max-width: 250px;
            text-align: center;
            font-size: 10px;
            line-height: 1.2;
            color: #26323e;
        }

        @media (max-width: 700px) {
            .kompassi-svg {
                width: 220px;
            }

            .kompassi-selite {
                max-width: 220px;
                font-size: 10px;
            }
        }

        form {
            text-align: center;
            margin-top: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            color: #495057;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 90%; /* Adjust the width as needed */
            max-width: 500px; /* Set a maximum width if desired */
            padding: 10px;
            margin: 0 auto; /* Center the input field horizontally */
            display: block; /* Make the input field a block element */
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            background-color: #555;
        }

        .error {
            color: red;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            background-color: #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            width: 60%; /* Adjust the width as needed */
            max-width: 300px; /* Set a maximum width if desired */
        }

        a:hover {
            background-color: #555;
        }

        #kartta {
            height: 400px;
            width: 80%; /* Adjust the width as needed */
            max-width: 900px; /* Set a maximum width if desired */
            margin: 20px 0; /* Adjust the margin as needed */
        }

        #lentokentta-nimi {
            display: none;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }

        #pisteet {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="otsikko-rivi">
        <h1>MAAILMAN MAAGINEN MAANARVAUSPELI</h1>
        <div class="kompassi-kortti" aria-label="Kompassi jossa ilmansuunnat ja väli-ilmansuunnat">
            <svg class="kompassi-svg" viewBox="0 0 320 320" role="img" aria-label="Kompassi: Pohjoinen, Koillinen, Itä, Kaakko, Etelä, Lounas, Länsi, Luode">
                <circle class="kompassi-dot-ring" cx="160" cy="160" r="145"></circle>
                <circle class="kompassi-outer-ring" cx="160" cy="160" r="122"></circle>
                <circle class="kompassi-middle-ring" cx="160" cy="160" r="108"></circle>
                <circle class="kompassi-tick-ring" cx="160" cy="160" r="96"></circle>
                <circle class="kompassi-inner-ring" cx="160" cy="160" r="82"></circle>

                <line class="kompassi-axis" x1="160" y1="52" x2="160" y2="268"></line>
                <line class="kompassi-axis" x1="52" y1="160" x2="268" y2="160"></line>
                <line class="kompassi-axis" x1="83" y1="83" x2="237" y2="237"></line>
                <line class="kompassi-axis" x1="83" y1="237" x2="237" y2="83"></line>

                <polygon class="kompassi-ruusu-cardinal" points="160,28 148,96 172,96"></polygon>
                <polygon class="kompassi-ruusu-cardinal" points="292,160 224,148 224,172"></polygon>
                <polygon class="kompassi-ruusu-cardinal" points="160,292 148,224 172,224"></polygon>
                <polygon class="kompassi-ruusu-cardinal" points="28,160 96,148 96,172"></polygon>

                <polygon class="kompassi-ruusu-vali" points="246,74 202,104 214,116"></polygon>
                <polygon class="kompassi-ruusu-vali" points="246,246 214,202 202,214"></polygon>
                <polygon class="kompassi-ruusu-vali" points="74,246 118,214 106,202"></polygon>
                <polygon class="kompassi-ruusu-vali" points="74,74 106,118 118,106"></polygon>

                <circle class="kompassi-keskusta" cx="160" cy="160" r="68"></circle>
                <path class="kompassi-joen-uoma" d="M126 184 C147 164, 165 165, 184 180 C169 176, 154 181, 136 201 C128 209, 122 218, 114 226 C119 208, 122 197, 126 184 Z"></path>

                <text class="kompassi-teksti-paa" x="160" y="14">Pohjoinen</text>
                <text class="kompassi-teksti-vali" x="252" y="68">Koillinen</text>
                <text class="kompassi-teksti-paa" x="304" y="160">Itä</text>
                <text class="kompassi-teksti-vali" x="252" y="252">Kaakko</text>
                <text class="kompassi-teksti-paa" x="160" y="306">Etelä</text>
                <text class="kompassi-teksti-vali" x="68" y="252">Lounas</text>
                <text class="kompassi-teksti-paa" x="22" y="160">Länsi</text>
                <text class="kompassi-teksti-vali" x="68" y="68">Luode</text>
            </svg>
            <p class="kompassi-selite">Ilmansuunnat ja väli-ilmansuunnat lunttia varten.</p>
        </div>
    </div>

    <form action="/game" method="post">
        <label for="pelaajan_maa">Arvaa maa:</label>
        <input type="text" id="pelaajan_maa" name="pelaajan_maa" required>
        <input type="submit" value="Arvaa">
    </form>

    <!-- Näytä tulos tai virheviesti -->
    {% if result %}
        <p class="{{ 'error' if result_category == 'danger' else '' }}">{{ result }}</p>
    {% endif %}

    <!-- Lisää kartta-div-elementti -->
    <div id="kartta"></div>

    <!-- Lisää "Vihje" -napin ja suurimman lentokentän nimen näyttävän elementin -->
    <button id="vihje-nappi" type="button" {% if vihje_kaytetty %}disabled{% endif %}>Vihje -300p</button>
    <p id="lentokentta-nimi" {% if vihje_teksti %}style="display: block;"{% endif %}>{{ vihje_teksti or '' }}</p>

    <!-- Näytä pisteet -->
    <p id="pisteet">Pisteet: {{ points }}</p>

    <!-- Lisää "Aloita uusi peli" -linkki -->
    <a href="#" id="uusi-peli-linkki">Aloita uusi peli</a>

    <!-- Lisää linkit navigointiin -->
    <a href="/leaderboard">Pistetaulukko</a>
    <a href="/logout">Kirjaudu ulos</a>

    <!-- Leaflet.js ja JavaScript-koodi -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Luo kartta
            var kartta = L.map('kartta').setView([0, 0], 2); // Aseta alkuarvo ja zoom-taso
            var arvatutMaat = {{ arvatut_maat|default([], true)|tojson }};

            // Lisää taustakartta ilman tekstejä (no labels)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
            }).addTo(kartta);

            function piirraMaidenRajatJaArvatutMaat() {
                fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
                    .then(response => response.json())
                    .then(data => {
                        L.geoJSON(data, {
                            style: function (feature) {
                                var isoKoodi = ((feature.properties || {})['ISO3166-1-Alpha-2'] || '').toUpperCase();
                                var onArvattu = arvatutMaat.includes(isoKoodi);
                                return {
                                    color: onArvattu ? '#b00020' : '#4a4a4a',
                                    weight: onArvattu ? 2.0 : 1.4,
                                    opacity: 0.95,
                                    fillColor: onArvattu ? '#ff3b30' : '#ffffff',
                                    fillOpacity: onArvattu ? 0.45 : 0.02
                                };
                            }
                        }).addTo(kartta);
                    })
                    .catch(error => {
                        console.error('Virhe maiden rajojen latauksessa: ' + error);
                    });
            }

            // Funktio nuolen piirtämiseen kartalle
            function piirraNuoli(lat1, lon1, lat2, lon2) {
                var nuolenKuva = L.divIcon({
                    className: 'arrow-icon',
                    iconSize: [12, 12],
                    html: '<div class="arrow-up"></div>'
                });

                L.marker([lat1, lon1], { icon: nuolenKuva }).addTo(kartta);

                var polyline = L.polyline([[lat1, lon1], [lat2, lon2]], {
                    color: 'blue'
                }).addTo(kartta);
            }

            // Function to add a large red dot on the map
            function lisaaPunainenPiste(lat, lon) {
                var redDot = L.circleMarker([lat, lon], {
                    radius: 10,
                    color: 'red',
                    fillColor: '#f03',
                    fillOpacity: 0.5
                }).addTo(kartta);
            }

            piirraMaidenRajatJaArvatutMaat();

            // Tarkista, onko etäisyys ja ilmansuunta saatavilla ja piirrä nuoli
            var etaisyys = {{ etaisyys|default('null') }};
            var ilmansuunta = "{{ ilmansuunta|default('') }}";
            if (etaisyys !== null && ilmansuunta !== "") {
                piirraNuoli(0, 0, etaisyys, ilmansuunta);
            }

            // Add red dot if guessed coordinates are available
            {% if pelaajan_maa_koord %}
                lisaaPunainenPiste({{ pelaajan_maa_koord[0] }}, {{ pelaajan_maa_koord[1] }});
            {% endif %}

            // Function to display the largest airport name
            function naytaLentokenttaNimi() {
                fetch('/get_largest_airport_name')  // Lisää uusi reitti palvelimelle
                    .then(response => response.json())
                    .then(data => {
                        var lentokenttaNimi = data.largest_airport_name;
                        var lentokenttaNimiElementti = document.getElementById("lentokentta-nimi");
                        lentokenttaNimiElementti.innerHTML = "Maan suurin lentokenttä on: " + lentokenttaNimi;
                        lentokenttaNimiElementti.style.display = "block";
                        if (data.points !== null && data.points !== undefined) {
                            document.getElementById("pisteet").innerHTML = "Pisteet: " + data.points;
                        }
                        vihjeNappi.disabled = true;
                    })
                    .catch(error => {
                        console.error('Virhe haettaessa suurinta lentokenttää: ' + error);
                    });
            }

            // Listen for the "Hint" button click
            var vihjeNappi = document.getElementById("vihje-nappi");
            vihjeNappi.addEventListener("click", naytaLentokenttaNimi);

            // Etsi "Aloita uusi peli" -linkki
            var uusiPeliLinkki = document.getElementById("uusi-peli-linkki");

            // Lisää klikkaustapahtumankäsittelijä linkille
            uusiPeliLinkki.addEventListener("click", function (event) {
                event.preventDefault(); // Estä linkin oletustoiminto (navigointi)

                // Tee pyyntö uuden maan arpomiseksi
                fetch('/new_game')  // Korvaa '/new_game' tarvittavalla reitillä palvelimellasi
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // Uusi maa arvottiin onnistuneesti, päivitä sivu peliä varten
                            location.reload();
                        } else {
                            console.error('Virhe uuden maan arpomisessa.');
                        }
                    })
                    .catch(error => {
                        console.error('Virhe uutta peliä aloittaessa: ' + error);
                    });
            });
        });
    </script>
</body>
</html>
