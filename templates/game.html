<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristoffer Kolumbuksen jäljillä – maanarvauspeli - Pelaa</title>
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/antique-theme.css') }}" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100svh;
        }

        .peli-paneeli {
            width: min(96vw, 1140px);
            margin: 2px auto;
            padding: 4px 10px 8px;
            background: rgba(247, 236, 214, 0.88);
            border: 1px solid rgba(113, 81, 45, 0.42);
            border-radius: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: calc(100svh - 6px);
            max-height: calc(100svh - 6px);
            box-shadow:
                inset 0 0 0 1px rgba(236, 219, 187, 0.55),
                0 14px 28px rgba(73, 48, 24, 0.18);
        }

        h1 {
            text-align: center;
            color: #3b2a16;
            margin: 0;
            letter-spacing: 0.8px;
            line-height: 1.05;
            max-width: none;
            flex: 1;
        }

        .ylarivi {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            align-items: stretch;
            width: min(100%, 980px);
            gap: 12px;
            margin: 0 auto 2px;
        }

        .vasen-ylasarake {
            display: grid;
            grid-template-rows: 1fr auto 1fr auto;
            align-items: center;
            min-width: 0;
            width: 100%;
            transform: translateX(calc(50% - 110px));
        }

        .oikea-ylasarake {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            justify-self: center;
            gap: 8px;
            min-width: 220px;
        }

        .arvaus-alue {
            width: min(100%, 720px);
            margin: 0 auto;
        }

        .vasen-ylasarake h1 {
            grid-row: 2;
        }

        .vasen-ylasarake .arvaus-alue {
            grid-row: 4;
        }

        .kompassi-kortti {
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            flex-shrink: 0;
            box-shadow: none;
        }

        .kompassi-svg {
            width: 226px;
            max-width: 34vw;
            height: auto;
            display: block;
        }

        .kompassi-dot-ring {
            fill: none;
            stroke: #12141b;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 0.2 14.5;
        }

        .kompassi-outer-ring {
            fill: #ffffff;
            stroke: #11131a;
            stroke-width: 4;
        }

        .kompassi-middle-ring {
            fill: none;
            stroke: #1a1d26;
            stroke-width: 3;
        }

        .kompassi-tick-ring {
            fill: none;
            stroke: #2b2f3b;
            stroke-width: 8;
            stroke-dasharray: 1 7;
        }

        .kompassi-inner-ring {
            fill: #f4f5f8;
            stroke: #131722;
            stroke-width: 3;
        }

        .kompassi-axis {
            stroke: #1d2230;
            stroke-width: 2;
            opacity: 0.75;
        }

        .kompassi-ruusu-cardinal {
            fill: #1d2230;
        }

        .kompassi-ruusu-vali {
            fill: #3a4050;
        }

        .kompassi-keskusta {
            fill: #11131a;
            stroke: #11131a;
            stroke-width: 1;
        }

        .kompassi-joen-uoma {
            fill: #ffffff;
        }

        .kompassi-teksti-paa {
            fill: #11131a;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.2px;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .kompassi-teksti-vali {
            fill: #11131a;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1px;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        @media (max-width: 900px) {
            .ylarivi {
                gap: 8px;
            }

            .vasen-ylasarake {
                transform: translateX(calc(44% - 100px));
            }

            .oikea-ylasarake {
                min-width: 190px;
            }

            .kompassi-svg {
                width: 194px;
                max-width: 31vw;
            }

            #pisteet {
                font-size: 23px;
            }

            .arvaus-alue {
                width: min(100%, 650px);
            }
        }

        @media (max-width: 620px) {
            .peli-paneeli {
                width: min(97vw, 1140px);
                padding: 6px 6px 12px;
                margin: 3px auto;
                border-radius: 12px;
            }

            h1 {
                font-size: 24px;
                max-width: none;
            }

            .ylarivi {
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 6px;
            }

            .vasen-ylasarake {
                transform: none;
                display: grid;
                grid-template-rows: 1fr auto 1fr auto;
                align-items: center;
            }

            .oikea-ylasarake {
                min-width: 126px;
                gap: 4px;
                justify-self: end;
            }

            .kompassi-svg {
                width: 128px;
                max-width: 39vw;
            }

            #pisteet {
                font-size: 18px;
            }
        }

        @media (max-width: 460px) {
            h1 {
                font-size: 20px;
                line-height: 1.08;
            }

            .ylarivi {
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 4px;
            }

            .oikea-ylasarake {
                min-width: 104px;
                gap: 2px;
            }

            .kompassi-svg {
                width: 116px;
                max-width: 42vw;
            }

            #pisteet {
                font-size: 15px;
            }

            .arvaus-alue {
                width: min(100%, 460px);
            }
        }

        form {
            text-align: center;
            margin-top: 0;
        }

        .arvaus-rivi {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        label {
            font-weight: bold;
            display: inline-block;
            color: #495057;
            margin-bottom: 2px;
            width: auto;
            max-width: 100%;
            text-align: center;
            white-space: nowrap;
        }

        input[type="text"] {
            width: auto;
            max-width: 100%;
            min-width: 240px;
            padding: 9px;
            margin: 0;
            display: block; /* Make the input field a block element */
            border: 1px solid #9f7a4c;
            background-color: #fbf3e3;
            color: #3d2a17;
            border-radius: 5px;
        }

        input[type="submit"],
        #uusi-peli-arvaus-btn {
            background-color: #5a3f22;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 4px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        input[type="submit"]:hover,
        #uusi-peli-arvaus-btn:hover {
            background-color: #74542f;
        }

        .error {
            color: red;
        }

        .tulos-teksti {
            text-align: center;
            margin-top: 12px;
            font-weight: 600;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            background-color: #5a3f22;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            width: 60%; /* Adjust the width as needed */
            max-width: 300px; /* Set a maximum width if desired */
        }

        a:hover {
            background-color: #74542f;
        }

        .toiminto-rivi {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 6px;
        }

        .toiminto-rivi a {
            display: inline-block;
            margin-top: 0;
            width: auto;
            min-width: 180px;
            max-width: none;
            padding: 10px 18px;
        }

        #kartta {
            flex: 1 1 auto;
            width: min(100%, 980px);
            max-width: 980px;
            margin: 8px auto 6px;
            min-height: 260px;
            border: 2px solid rgba(93, 64, 34, 0.56);
            box-shadow:
                inset 0 0 0 1px rgba(177, 138, 89, 0.55),
                0 12px 24px rgba(80, 53, 27, 0.18);
        }

        #lentokentta-nimi {
            display: none;
            text-align: center;
            margin-top: 6px;
            font-weight: bold;
        }

        #pisteet {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin: 0;
            color: #3b2a16;
            line-height: 1;
            white-space: nowrap;
            width: 100%;
        }

        #vihje-nappi {
            display: inline-block;
            width: auto !important;
            max-width: none;
            min-width: 0;
            margin: 4px auto 0;
            padding: 6px 12px;
            align-self: center;
        }

        @media (max-height: 820px) {
            .peli-paneeli {
                height: calc(100svh - 4px);
                max-height: calc(100svh - 4px);
            }

            #kartta {
                min-height: 210px;
            }
        }

        @media (max-width: 760px) {
            .arvaus-alue {
                margin-top: 6px;
            }

            .arvaus-alue form {
                width: 100%;
            }

            label {
                display: block;
                width: 100%;
                white-space: normal;
            }

            input[type="text"] {
                width: 100% !important;
                min-width: 0;
            }
        }

        #ilotulitus-canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 40;
            opacity: 0.74;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="ilotulitus-canvas" aria-hidden="true"></canvas>
    <div class="peli-paneeli">
    <div class="ylarivi">
        <div class="vasen-ylasarake">
            <h1>Kristoffer Kolumbuksen jäljillä – maanarvauspeli</h1>
            <div class="arvaus-alue">
                <form action="/game" method="post">
                    <label for="pelaajan_maa">Arvaa maa kirjoittamalla tai painamalla maata kartasta:</label>
                    <div class="arvaus-rivi">
                        <input type="text" id="pelaajan_maa" name="pelaajan_maa" required {% if kierros_voitettu %}disabled{% endif %}>
                    </div>
                    {% if kierros_voitettu %}
                        <button type="button" id="uusi-peli-arvaus-btn">Aloita uusi peli</button>
                    {% else %}
                        <input type="submit" value="Arvaa">
                    {% endif %}
                </form>
            </div>
        </div>
        <div class="oikea-ylasarake">
            <div class="kompassi-kortti" aria-label="Kompassi jossa ilmansuunnat ja väli-ilmansuunnat">
                <img
                    class="kompassi-svg"
                    src="{{ url_for('static', filename='images/compass-logo-antique.svg') }}"
                    alt="Antiikkinen kompassi: Pohjoinen, Koillinen, Itä, Kaakko, Etelä, Lounas, Länsi, Luode"
                />
            </div>
            <p id="pisteet">Pisteet: {{ points }}</p>
        </div>
    </div>

    <!-- Näytä tulos tai virheviesti -->
    {% if result %}
        <p class="tulos-teksti {{ 'error' if result_category == 'danger' else '' }}">{{ result }}</p>
    {% endif %}

    <!-- Lisää kartta-div-elementti -->
    <div id="kartta"></div>

    <!-- Lisää "Vihje" -napin ja suurimman lentokentän nimen näyttävän elementin -->
    <button id="vihje-nappi" type="button" {% if vihje_kaytetty or kierros_voitettu %}disabled{% endif %}>Vihje -{{ vihje_hinta|default(0, true) }}p</button>
    <p id="lentokentta-nimi" {% if vihje_teksti %}style="display: block;"{% endif %}>{{ vihje_teksti or '' }}</p>

    <div class="toiminto-rivi">
        <a href="#" id="uusi-peli-linkki">Aloita uusi peli</a>
        <a href="/leaderboard">Pistetaulukko</a>
        <a href="/logout">Vaihda nimeä</a>
    </div>
    </div>

    <!-- Leaflet.js ja JavaScript-koodi -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var KARTTA_NAKYMA_AVAIN = 'lentokonepeli_map_view';
            var OLETUS_KARTTA_KESKIPISTE = [40.4168, -3.7038]; // Madrid, Espanja
            var OLETUS_KARTTA_ZOOM = 2;

            function haeTallennettuKarttaNakyma() {
                try {
                    var raw = localStorage.getItem(KARTTA_NAKYMA_AVAIN);
                    if (!raw) return null;
                    var data = JSON.parse(raw);
                    if (!data) return null;
                    var lat = Number(data.lat);
                    var lng = Number(data.lng);
                    var zoom = Number(data.zoom);
                    if (!Number.isFinite(lat) || !Number.isFinite(lng) || !Number.isFinite(zoom)) {
                        return null;
                    }
                    if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
                        return null;
                    }
                    return { lat: lat, lng: lng, zoom: zoom };
                } catch (e) {
                    return null;
                }
            }

            // Luo kartta: käytä edellistä näkymää, jos se on tallennettu.
            var tallennettuNakyma = haeTallennettuKarttaNakyma();
            var kartta = L.map('kartta').setView(
                tallennettuNakyma ? [tallennettuNakyma.lat, tallennettuNakyma.lng] : OLETUS_KARTTA_KESKIPISTE,
                tallennettuNakyma ? tallennettuNakyma.zoom : OLETUS_KARTTA_ZOOM
            );
            var arvatutMaat = {{ arvatut_maat|default([], true)|tojson }};
            var isoMaaNimiMap = {{ iso_maa_nimi_map|default({}, true)|tojson }};
            var maaNimiMap = {{ maa_nimi_map|default({}, true)|tojson }};
            var karttaAliasit = {{ kartta_aliasit|default({}, true)|tojson }};
            var sallitutMaat = new Set(
                ({{ sallitut_iso_koodit|default([], true)|tojson }} || []).map(function (koodi) {
                    return String(koodi || '').toUpperCase();
                })
            );
            var kierrosVoitettu = {{ kierros_voitettu|default(false, true)|tojson }};
            var oikeaMaaIso = "{{ oikea_maa_iso|default('', true) }}".toUpperCase();
            var valittuMaaIso = null;
            var maatLayer = null;
            var arvausKentta = document.getElementById("pelaajan_maa");
            var arvausLabel = document.querySelector('label[for="pelaajan_maa"]');
            var arvausAlue = document.querySelector('.arvaus-alue');
            var GEOJSON_URL = 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson';
            var GEOJSON_CACHE_KEY = 'lentokonepeli_geo_countries_v1';
            var GEOJSON_CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
            var ilotulitusCanvas = document.getElementById('ilotulitus-canvas');
            var ilotulitusCtx = ilotulitusCanvas ? ilotulitusCanvas.getContext('2d') : null;
            var ilotulitusAnimaatioId = null;
            var ilotulitusKaynnissa = false;
            var ilotulitusRaketit = [];
            var ilotulitusPartikkelit = [];
            var viimeisinRakettiAika = 0;
            var ilotulitusSyntyvaliMs = 190;
            var ilotulitusEdellinenAika = 0;

            function paivitaIlotulitusCanvasKoko() {
                if (!ilotulitusCanvas || !ilotulitusCtx) return;
                var dpr = Math.max(1, window.devicePixelRatio || 1);
                var leveys = window.innerWidth || document.documentElement.clientWidth || 1;
                var korkeus = window.innerHeight || document.documentElement.clientHeight || 1;
                ilotulitusCanvas.width = Math.floor(leveys * dpr);
                ilotulitusCanvas.height = Math.floor(korkeus * dpr);
                ilotulitusCanvas.style.width = leveys + 'px';
                ilotulitusCanvas.style.height = korkeus + 'px';
                ilotulitusCtx.setTransform(1, 0, 0, 1, 0, 0);
                ilotulitusCtx.scale(dpr, dpr);
            }

            function satunnainenIlotulitusVari() {
                var hue = Math.floor(Math.random() * 360);
                return 'hsl(' + hue + ', 100%, 64%)';
            }

            function luoRaketti() {
                var leveys = ilotulitusCanvas.clientWidth || window.innerWidth;
                var korkeus = ilotulitusCanvas.clientHeight || window.innerHeight;
                var x = leveys * (0.06 + Math.random() * 0.88);
                var y = korkeus + 12;
                var kulma = (-Math.PI / 2) + ((Math.random() - 0.5) * 0.24);
                var nopeus = 7.2 + Math.random() * 2.1;
                return {
                    x: x,
                    y: y,
                    vx: Math.cos(kulma) * (0.7 + Math.random() * 1.2),
                    vy: -nopeus,
                    tavoiteY: korkeus * (0.19 + Math.random() * 0.36),
                    vari: satunnainenIlotulitusVari(),
                    trail: []
                };
            }

            function luoRajahdys(x, y, perusVari) {
                var maara = 26 + Math.floor(Math.random() * 26);
                for (var i = 0; i < maara; i++) {
                    var kulma = Math.random() * Math.PI * 2;
                    var nopeus = 1.2 + Math.random() * 3.5;
                    ilotulitusPartikkelit.push({
                        x: x,
                        y: y,
                        px: x,
                        py: y,
                        vx: Math.cos(kulma) * nopeus,
                        vy: Math.sin(kulma) * nopeus,
                        life: 1,
                        decay: 0.012 + Math.random() * 0.013,
                        koko: 1.6 + Math.random() * 1.9,
                        vari: Math.random() < 0.18 ? '#ffffff' : perusVari
                    });
                }
                if (ilotulitusPartikkelit.length > 420) {
                    ilotulitusPartikkelit.splice(0, ilotulitusPartikkelit.length - 420);
                }
            }

            function piirraRaketti(raketti) {
                if (!ilotulitusCtx) return;
                ilotulitusCtx.beginPath();
                if (raketti.trail.length > 0) {
                    ilotulitusCtx.moveTo(raketti.trail[0].x, raketti.trail[0].y);
                    for (var i = 1; i < raketti.trail.length; i++) {
                        ilotulitusCtx.lineTo(raketti.trail[i].x, raketti.trail[i].y);
                    }
                } else {
                    ilotulitusCtx.moveTo(raketti.x, raketti.y);
                }
                ilotulitusCtx.strokeStyle = raketti.vari;
                ilotulitusCtx.lineWidth = 2.1;
                ilotulitusCtx.globalAlpha = 0.82;
                ilotulitusCtx.stroke();

                ilotulitusCtx.beginPath();
                ilotulitusCtx.arc(raketti.x, raketti.y, 1.8, 0, Math.PI * 2);
                ilotulitusCtx.fillStyle = '#ffecc7';
                ilotulitusCtx.globalAlpha = 0.95;
                ilotulitusCtx.fill();
            }

            function piirraPartikkeli(partikkeli) {
                if (!ilotulitusCtx) return;
                ilotulitusCtx.beginPath();
                ilotulitusCtx.moveTo(partikkeli.px, partikkeli.py);
                ilotulitusCtx.lineTo(partikkeli.x, partikkeli.y);
                ilotulitusCtx.strokeStyle = partikkeli.vari;
                ilotulitusCtx.lineWidth = Math.max(0.6, partikkeli.koko * partikkeli.life);
                ilotulitusCtx.globalAlpha = Math.max(0, partikkeli.life * 0.9);
                ilotulitusCtx.stroke();
            }

            function paivitaIlotulitus(aika) {
                if (!ilotulitusKaynnissa || !ilotulitusCtx) return;
                if (!ilotulitusEdellinenAika) ilotulitusEdellinenAika = aika;
                var dt = Math.min(0.033, (aika - ilotulitusEdellinenAika) / 1000);
                ilotulitusEdellinenAika = aika;

                ilotulitusCtx.clearRect(0, 0, ilotulitusCanvas.clientWidth, ilotulitusCanvas.clientHeight);

                if (aika - viimeisinRakettiAika > ilotulitusSyntyvaliMs && ilotulitusRaketit.length < 4) {
                    ilotulitusRaketit.push(luoRaketti());
                    viimeisinRakettiAika = aika;
                }

                for (var i = ilotulitusRaketit.length - 1; i >= 0; i--) {
                    var r = ilotulitusRaketit[i];
                    r.trail.push({ x: r.x, y: r.y });
                    if (r.trail.length > 7) r.trail.shift();
                    r.x += r.vx * (60 * dt);
                    r.y += r.vy * (60 * dt);
                    r.vy += 0.048 * (60 * dt);
                    piirraRaketti(r);
                    if (r.y <= r.tavoiteY || r.vy >= -1) {
                        luoRajahdys(r.x, r.y, r.vari);
                        ilotulitusRaketit.splice(i, 1);
                    }
                }

                for (var j = ilotulitusPartikkelit.length - 1; j >= 0; j--) {
                    var p = ilotulitusPartikkelit[j];
                    p.px = p.x;
                    p.py = p.y;
                    p.x += p.vx * (60 * dt);
                    p.y += p.vy * (60 * dt);
                    p.vx *= 0.986;
                    p.vy = (p.vy * 0.992) + (0.044 * (60 * dt));
                    p.life -= p.decay * (60 * dt);
                    piirraPartikkeli(p);
                    if (p.life <= 0) {
                        ilotulitusPartikkelit.splice(j, 1);
                    }
                }

                ilotulitusCtx.globalAlpha = 1;
                ilotulitusAnimaatioId = requestAnimationFrame(paivitaIlotulitus);
            }

            function lopetaIlotulitus() {
                if (!ilotulitusKaynnissa) return;
                ilotulitusKaynnissa = false;
                if (ilotulitusAnimaatioId) {
                    cancelAnimationFrame(ilotulitusAnimaatioId);
                    ilotulitusAnimaatioId = null;
                }
                ilotulitusRaketit = [];
                ilotulitusPartikkelit = [];
                ilotulitusEdellinenAika = 0;
                if (ilotulitusCtx && ilotulitusCanvas) {
                    ilotulitusCtx.clearRect(0, 0, ilotulitusCanvas.clientWidth, ilotulitusCanvas.clientHeight);
                    ilotulitusCanvas.style.display = 'none';
                }
            }

            function kaynnistaIlotulitus() {
                if (!ilotulitusCanvas || !ilotulitusCtx || ilotulitusKaynnissa) return;
                if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                paivitaIlotulitusCanvasKoko();
                ilotulitusCanvas.style.display = 'block';
                ilotulitusKaynnissa = true;
                viimeisinRakettiAika = performance.now();
                ilotulitusAnimaatioId = requestAnimationFrame(paivitaIlotulitus);
            }

            function normalisoiMaaSyote(teksti) {
                if (!teksti) return '';
                return String(teksti)
                    .toLowerCase()
                    .replace(/[^\p{L}\p{N}]/gu, '');
            }

            // Lisää taustakartta ilman tekstejä (no labels), vaaleansinisellä merellä
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
            }).addTo(kartta);

            // Varmista, että Leaflet laskee flex-korkeuden oikein.
            setTimeout(function () { kartta.invalidateSize(); }, 0);
            window.addEventListener('resize', function () { kartta.invalidateSize(); });

            function paivitaArvausKentanLeveys() {
                if (!arvausKentta || !arvausLabel || !arvausAlue) return;
                if (window.innerWidth <= 760) return; // mobiilissa 100% leveys
                var labelLeveys = Math.ceil(arvausLabel.getBoundingClientRect().width);
                var alueLeveys = Math.floor(arvausAlue.getBoundingClientRect().width);
                var kentanLeveys = Math.max(240, Math.min(labelLeveys, alueLeveys));
                arvausKentta.style.width = kentanLeveys + 'px';
            }

            function tallennaKarttaNakyma() {
                try {
                    if (!kartta) return;
                    var keskikohta = kartta.getCenter();
                    localStorage.setItem(KARTTA_NAKYMA_AVAIN, JSON.stringify({
                        lat: Number(keskikohta.lat.toFixed(6)),
                        lng: Number(keskikohta.lng.toFixed(6)),
                        zoom: kartta.getZoom()
                    }));
                } catch (e) {
                    // Tallennus ei estä pelaamista, joten ignoroidaan hiljaisesti.
                }
            }

            paivitaArvausKentanLeveys();
            window.addEventListener('resize', paivitaArvausKentanLeveys);
            window.addEventListener('resize', paivitaIlotulitusCanvasKoko);
            kartta.on('moveend zoomend', tallennaKarttaNakyma);

            var arvausForm = document.querySelector('.arvaus-alue form');
            if (arvausForm) {
                arvausForm.addEventListener('submit', tallennaKarttaNakyma);
            }

            function haeRajaPaksuus(perusPaksuus) {
                var zoom = kartta.getZoom();
                if (zoom <= 2) return perusPaksuus * 0.55;
                if (zoom <= 4) return perusPaksuus * 0.75;
                if (zoom <= 6) return perusPaksuus * 0.95;
                return perusPaksuus * 1.12;
            }

            function haeMaanTyyli(feature) {
                var props = feature.properties || {};
                var isoKoodi = (props['ISO3166-1-Alpha-2'] || '').toUpperCase();
                var onSallittu = sallitutMaat.has(isoKoodi);
                var onValittu = valittuMaaIso && valittuMaaIso === isoKoodi;
                var onArvattu = arvatutMaat.includes(isoKoodi);
                var onOikea = oikeaMaaIso && oikeaMaaIso === isoKoodi;

                if (!onSallittu) {
                    return {
                        color: '#6f7378',
                        weight: haeRajaPaksuus(0.85),
                        opacity: 0.55,
                        fillColor: '#cfd3d8',
                        fillOpacity: 0.12
                    };
                }

                // Oikein arvattu maa näytetään vihreänä.
                if (onArvattu && onOikea) {
                    return {
                        color: '#18723b',
                        weight: haeRajaPaksuus(1.45),
                        opacity: 0.9,
                        fillColor: '#2ecc71',
                        fillOpacity: 0.32
                    };
                }

                // Arvattu maa pysyy aina punaisena, vaikka sitä klikataan.
                if (onArvattu) {
                    return {
                        color: '#b2202b',
                        weight: haeRajaPaksuus(1.4),
                        opacity: 0.86,
                        fillColor: '#ff3b30',
                        fillOpacity: 0.30
                    };
                }

                if (onValittu) {
                    return {
                        color: '#6f7682',
                        weight: haeRajaPaksuus(1.5),
                        opacity: 0.92,
                        fillColor: '#a8adb6',
                        fillOpacity: 0.42
                    };
                }

                return {
                    color: '#5b5f67',
                    weight: haeRajaPaksuus(0.95),
                    opacity: 0.76,
                    fillColor: '#d8dde3',
                    fillOpacity: 0.18
                };
            }

            function paivitaMaatTyylit() {
                if (maatLayer) {
                    maatLayer.setStyle(haeMaanTyyli);
                }
            }

            function haeMaatGeojson() {
                try {
                    var cacheRaw = localStorage.getItem(GEOJSON_CACHE_KEY);
                    if (cacheRaw) {
                        var cache = JSON.parse(cacheRaw);
                        if (
                            cache &&
                            cache.savedAt &&
                            (Date.now() - Number(cache.savedAt) < GEOJSON_CACHE_MAX_AGE_MS) &&
                            cache.data &&
                            cache.data.type === 'FeatureCollection'
                        ) {
                            return Promise.resolve(cache.data);
                        }
                    }
                } catch (e) {
                    // Välimuistin lukuvirhe ei saa estää peliä.
                }

                return fetch(GEOJSON_URL)
                    .then(function (response) { return response.json(); })
                    .then(function (data) {
                        try {
                            localStorage.setItem(
                                GEOJSON_CACHE_KEY,
                                JSON.stringify({ savedAt: Date.now(), data: data })
                            );
                        } catch (e) {
                            // Välimuisti voi olla täynnä; ohitetaan hiljaisesti.
                        }
                        return data;
                    });
            }

            function piirraMaidenRajatJaArvatutMaat() {
                haeMaatGeojson()
                    .then(data => {
                        try {
                            var klikattavatKoodit = [];
                            (data.features || []).forEach(function (feature) {
                                var props = feature.properties || {};
                                var isoKoodi = (props['ISO3166-1-Alpha-2'] || '').toUpperCase();
                                if (sallitutMaat.has(isoKoodi)) {
                                    klikattavatKoodit.push(isoKoodi);
                                }
                            });
                            var uniikitKlikattavat = Array.from(new Set(klikattavatKoodit));
                            if (uniikitKlikattavat.length > 0) {
                                document.cookie = [
                                    'klikattavat_maat=' + uniikitKlikattavat.join(','),
                                    'path=/',
                                    'max-age=' + (60 * 60 * 24 * 30),
                                    'SameSite=Lax'
                                ].join(';');
                            }
                        } catch (e) {
                            console.warn('Klikattavien maatietojen tallennus epäonnistui:', e);
                        }

                        maatLayer = L.geoJSON(data, {
                            style: haeMaanTyyli,
                            onEachFeature: function (feature, layer) {
                                var props = feature.properties || {};
                                var isoKoodi = (props['ISO3166-1-Alpha-2'] || '').toUpperCase();
                                if (!sallitutMaat.has(isoKoodi)) {
                                    return;
                                }
                                layer.on('click', function () {
                                    valittuMaaIso = (props['ISO3166-1-Alpha-2'] || '').toUpperCase() || null;
                                    var maanNimi = (props.name || '').trim();
                                    var korjattuNimi = isoMaaNimiMap[valittuMaaIso] || null;
                                    var normalisoituNimi = normalisoiMaaSyote(maanNimi);
                                    if (!korjattuNimi) {
                                        korjattuNimi = maaNimiMap[normalisoituNimi] || null;
                                    }
                                    if (!korjattuNimi) {
                                        var aliasKohde = karttaAliasit[normalisoituNimi];
                                        if (aliasKohde) {
                                            korjattuNimi = maaNimiMap[aliasKohde] || aliasKohde;
                                        }
                                    }
                                    var naytettavaNimi = korjattuNimi || maanNimi;
                                    if (naytettavaNimi && arvausKentta && !kierrosVoitettu) {
                                        arvausKentta.value = naytettavaNimi;
                                        arvausKentta.focus();
                                    }
                                    paivitaMaatTyylit();
                                });
                            }
                        }).addTo(kartta);

                        kartta.on('zoomend', paivitaMaatTyylit);
                    })
                    .catch(error => {
                        console.error('Virhe maiden rajojen latauksessa: ' + error);
                    });
            }

            // Funktio nuolen piirtämiseen kartalle
            function piirraNuoli(lat1, lon1, lat2, lon2) {
                var nuolenKuva = L.divIcon({
                    className: 'arrow-icon',
                    iconSize: [12, 12],
                    html: '<div class="arrow-up"></div>'
                });

                L.marker([lat1, lon1], { icon: nuolenKuva }).addTo(kartta);

                var polyline = L.polyline([[lat1, lon1], [lat2, lon2]], {
                    color: 'blue'
                }).addTo(kartta);
            }

            // Function to add a large red dot on the map
            function lisaaPunainenPiste(lat, lon) {
                var redDot = L.circleMarker([lat, lon], {
                    radius: 10,
                    color: 'red',
                    fillColor: '#f03',
                    fillOpacity: 0.5
                }).addTo(kartta);
            }

            // Function to add a large green dot on the map
            function lisaaVihreaPiste(lat, lon) {
                var greenDot = L.circleMarker([lat, lon], {
                    radius: 10,
                    color: '#0f6b36',
                    fillColor: '#2ecc71',
                    fillOpacity: 0.55
                }).addTo(kartta);
            }

            piirraMaidenRajatJaArvatutMaat();

            // Tarkista, onko etäisyys ja ilmansuunta saatavilla ja piirrä nuoli
            var etaisyys = {{ etaisyys|default('null') }};
            var ilmansuunta = "{{ ilmansuunta|default('') }}";
            if (etaisyys !== null && ilmansuunta !== "") {
                piirraNuoli(0, 0, etaisyys, ilmansuunta);
            }

            // Add red dot if guessed coordinates are available
            {% if pelaajan_maa_koord %}
                {% if oikea_osuma %}
                    lisaaVihreaPiste({{ pelaajan_maa_koord[0] }}, {{ pelaajan_maa_koord[1] }});
                {% else %}
                    lisaaPunainenPiste({{ pelaajan_maa_koord[0] }}, {{ pelaajan_maa_koord[1] }});
                {% endif %}
            {% endif %}

            // Function to display the largest airport name
            function naytaLentokenttaNimi() {
                fetch('/get_largest_airport_name')  // Lisää uusi reitti palvelimelle
                    .then(response => response.json())
                    .then(data => {
                        var lentokenttaNimi = data.largest_airport_name;
                        var lentokenttaNimiElementti = document.getElementById("lentokentta-nimi");
                        lentokenttaNimiElementti.innerHTML = "Maan suurin lentokenttä on: " + lentokenttaNimi;
                        lentokenttaNimiElementti.style.display = "block";
                        if (data.points !== null && data.points !== undefined) {
                            document.getElementById("pisteet").innerHTML = "Pisteet: " + data.points;
                        }
                        vihjeNappi.disabled = true;
                    })
                    .catch(error => {
                        console.error('Virhe haettaessa suurinta lentokenttää: ' + error);
                    });
            }

            // Listen for the "Hint" button click
            var vihjeNappi = document.getElementById("vihje-nappi");
            vihjeNappi.addEventListener("click", function () {
                lopetaIlotulitus();
                naytaLentokenttaNimi();
            });

            function aloitaUusiPeli(event) {
                if (event) {
                    event.preventDefault(); // Estä linkin oletustoiminto (navigointi)
                }
                lopetaIlotulitus();
                tallennaKarttaNakyma();
                // Tee pyyntö uuden maan arpomiseksi
                fetch('/new_game')  // Korvaa '/new_game' tarvittavalla reitillä palvelimellasi
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            // Uusi maa arvottiin onnistuneesti, päivitä sivu peliä varten
                            location.reload();
                        } else {
                            console.error('Virhe uuden maan arpomisessa.');
                        }
                    })
                    .catch(error => {
                        console.error('Virhe uutta peliä aloittaessa: ' + error);
                    });
            }

            // Etsi "Aloita uusi peli" -linkki
            var uusiPeliLinkki = document.getElementById("uusi-peli-linkki");
            uusiPeliLinkki.addEventListener("click", aloitaUusiPeli);

            var uusiPeliArvausNappi = document.getElementById("uusi-peli-arvaus-btn");
            if (uusiPeliArvausNappi) {
                uusiPeliArvausNappi.addEventListener("click", aloitaUusiPeli);
            }

            document.addEventListener('click', function (event) {
                var painettuNappi = event.target.closest('button, a, input[type="submit"], input[type="button"]');
                if (painettuNappi) {
                    lopetaIlotulitus();
                }
            }, true);

            if (kierrosVoitettu) {
                kaynnistaIlotulitus();
            }
        });
    </script>
</body>
</html>
