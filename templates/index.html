<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lentokenttäarvausmestari</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to top, floralwhite, lightsteelblue);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 80%;
            max-width: 800px;
            text-align: center;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #343a40;
        }

        p {
            color: #495057;
            font-size: 1.1em;
            margin-top: 10px;
        }

        form {
            margin-top: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: min(460px, 92%);
            padding: 12px;
            border: 1px solid #b8c4d2;
            border-radius: 8px;
            font-size: 16px;
        }

        button[type="submit"] {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #007bff;
            color: #ffffff;
            border: 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }

        .error {
            color: #b00020;
            font-weight: 600;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MAAILMAN MAAGINEN MAANARVAUSPELI</h1>
        <p>Tervetuloa pelaamaan ja testaamaan maantiedon taitojasi.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form action="/set_name" method="post">
            <label for="username">Mikä on nimesi?</label>
            <input type="text" id="username" name="username" value="{{ username }}" maxlength="50" required>
            <br>
            <button type="submit">Aloita peli</button>
        </form>
    </div>
</body>
</html>
