<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekisteröidy - Kristoffer Kolumbuksen jäljillä – maanarvauspeli</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/antique-theme.css') }}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            max-width: 400px;
            width: 80%;
            background-color: rgba(247, 236, 214, 0.88);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(113, 81, 45, 0.36);
            box-shadow: 0 16px 28px rgba(73, 48, 24, 0.16);
        }

        h1 {
            text-align: center;
            color: #3b2a16;
        }

        p {
            text-align: center;
            color: #666;
        }

        form {
            text-align: center;
            margin-top: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            color: #495057;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="password"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            display: block;
            width: calc(100% - 20px);
            padding: 10px;
            background-color: #5a3f22;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
            margin-left: 10px;
            margin-right: 10px;
        }

        input[type="submit"]:hover {
            background-color: #74542f;
        }

        .success {
            color: green;
        }

        .danger {
            color: red;
        }

        .info {
            color: blue;
        }

        .alert {
            color: red; /* Tekstin väri punaiseksi */
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rekisteröidy</h1>
        <form action="/register" method="post">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert">
                  <font color="red">{{ messages[0] }}</font>
                </div>
              {% endif %}
            {% endwith %}
            <label for="username">Käyttäjänimi:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Salasana:</label>
            <input type="password" id="password" name="password" required>

            <input type="submit" value="Rekisteröidy">
        </form>
        <p>Onko sinulla jo tili? <a href="/login">Kirjaudu sisään</a></p>
    </div>
</body>
</html>
