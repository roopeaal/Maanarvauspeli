services:
  - type: web
    name: maanarvauspeli
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT testi:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: "REQUIRED"
      - key: DB_SSL_CA_PATH
        sync: false
  - type: web
    name: maanarvauspeli-loader
    runtime: static
    buildCommand: "true"
    staticPublishPath: ./static-loader
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
